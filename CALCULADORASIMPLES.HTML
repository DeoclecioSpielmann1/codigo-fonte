<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1efe8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .calc {
      background: #fff;
      border: 1px solid #d3d1c7;
      border-radius: 16px;
      width: 280px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .display {
      padding: 1.25rem 1rem 1rem;
      text-align: right;
      border-bottom: 1px solid #d3d1c7;
    }

    .display .expr {
      font-size: 13px;
      color: #888780;
      min-height: 18px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .val {
      font-size: 32px;
      font-weight: 500;
      color: #2c2c2a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btns {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .btn {
      height: 60px;
      border: none;
      border-right: 1px solid #d3d1c7;
      border-bottom: 1px solid #d3d1c7;
      background: #fff;
      color: #2c2c2a;
      font-size: 16px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.1s;
      font-family: inherit;
    }

    .btn:nth-child(4n) { border-right: none; }
    .btn:nth-last-child(-n+4) { border-bottom: none; }
    .btn:hover { background: #f1efe8; }
    .btn:active { background: #d3d1c7; }

    .btn.op { color: #185FA5; font-weight: 500; }
    .btn.action { color: #5f5e5a; }

    .btn.eq {
      background: #185FA5;
      color: #fff;
      font-weight: 500;
    }
    .btn.eq:hover { background: #0C447C; }
    .btn.eq:active { background: #042C53; }

    .btn.zero { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="val" id="val">0</div>
    </div>
    <div class="btns">
      <button class="btn action" data-action="clear">C</button>
      <button class="btn action" data-action="sign">+/-</button>
      <button class="btn action" data-action="percent">%</button>
      <button class="btn op" data-op="/">÷</button>

      <button class="btn" data-num="7">7</button>
      <button class="btn" data-num="8">8</button>
      <button class="btn" data-num="9">9</button>
      <button class="btn op" data-op="*">×</button>

      <button class="btn" data-num="4">4</button>
      <button class="btn" data-num="5">5</button>
      <button class="btn" data-num="6">6</button>
      <button class="btn op" data-op="-">−</button>

      <button class="btn" data-num="1">1</button>
      <button class="btn" data-num="2">2</button>
      <button class="btn" data-num="3">3</button>
      <button class="btn op" data-op="+">+</button>

      <button class="btn zero" data-num="0">0</button>
      <button class="btn" data-action="dot">,</button>
      <button class="btn eq" data-action="eq">=</button>
    </div>
  </div>

  <script>
    let cur = '0', prev = '', op = null, reset = false;

    const valEl = document.getElementById('val');
    const exprEl = document.getElementById('expr');

    function updateDisplay() {
      valEl.textContent = cur.replace('.', ',');
    }

    function format(n) {
      return parseFloat(n.toPrecision(10)).toString().replace('.', ',');
    }

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const num = btn.dataset.num;
        const action = btn.dataset.action;
        const oper = btn.dataset.op;

        if (num !== undefined) {
          if (cur === '0' || reset) { cur = num; reset = false; }
          else if (cur.length < 10) cur += num;
          updateDisplay();
        }

        if (action === 'dot') {
          if (reset) { cur = '0.'; reset = false; }
          else if (!cur.includes('.')) cur += '.';
          updateDisplay();
        }

        if (action === 'clear') {
          cur = '0'; prev = ''; op = null; reset = false;
          exprEl.textContent = '';
          updateDisplay();
        }

        if (action === 'sign') {
          cur = String(parseFloat(cur) * -1);
          updateDisplay();
        }

        if (action === 'percent') {
          cur = String(parseFloat(cur) / 100);
          updateDisplay();
        }

        if (oper) {
          if (op && !reset) {
            const r = calc(parseFloat(prev), parseFloat(cur), op);
            cur = String(r);
            updateDisplay();
          }
          prev = cur; op = oper;
          const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[oper];
          exprEl.textContent = format(parseFloat(prev)) + ' ' + sym;
          reset = true;
        }

        if (action === 'eq') {
          if (!op) return;
          const a = parseFloat(prev), b = parseFloat(cur);
          const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
          exprEl.textContent = format(a) + ' ' + sym + ' ' + format(b) + ' =';
          const r = calc(a, b, op);
          cur = String(r);
          op = null; reset = true;
          updateDisplay();
        }
      });
    });

    function calc(a, b, o) {
      if (o === '+') return a + b;
      if (o === '-') return a - b;
      if (o === '*') return a * b;
      if (o === '/') return b === 0 ? 0 : a / b;
      return b;
    }
  </script>
</body>
</html>

<!--Mostre números de 1 até 10 usando for.-->
<!DOCTYPE html>
<html>
<body>
    <button onclick="processar()">Executar</button>
    <div id="saida"></div>
    <script>
        let texto = "";
        for (let i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }
        document.getElementById("saida").innerHTML = texto;
    </script>+
</body>
</html>

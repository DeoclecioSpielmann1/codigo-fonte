<!-- 3. Validação de Formulário -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação de Formulário</title>
</head>

<body>
    <h1>Validação de Formulário</h1>
    <form id="meuFormulario" onsubmit="return validarFormulario()">
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Informe seu email"><br><br>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Informe sua senha"><br><br>
        <input type="submit" value="Enviar">
    </form>

    <script>
        function validarFormulario() {
            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value.trim();

            if (email === "") {
                alert("Por favor, preencha o campo Email.");
                return false;
            }
            if (!email.includes("@") || !email.includes(".")) {
                alert("Por favor, insira um email válido.");
                return false;
            }

            if (senha === "") {
                alert("Por favor, preencha o campo Senha.");
                return false;
            }
            if (senha.length < 6) {
                alert("A senha deve conter pelo menos 6 caracteres.");
                return false;
            }
            alert("Formulário enviado com sucesso!");
            return true;
        }
    </script>

</body>

</html>
